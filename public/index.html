<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CNKT Predictor by EVOX</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/web3/1.10.0/web3.min.js"></script>
<style>
:root{
  --bg:#1A1033;
  --bg2:#130D28;
  --surface:#1E1538;
  --surface2:#251C45;
  --border:#2E2455;
  --gold:#FFD700;
  --gold2:#FFC200;
  --gold-dim:rgba(255,215,0,0.12);
  --up:#1FC7D4;
  --up2:#00E5A0;
  --up-dim:rgba(31,199,212,0.15);
  --dn:#ED4B9E;
  --dn-dim:rgba(237,75,158,0.15);
  --live:#7B5EFF;
  --live-dim:rgba(123,94,255,0.2);
  --text:#F4EEFF;
  --muted:#6B5E9A;
  --muted2:#2E2455;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%}
body{background:var(--bg2);color:var(--text);font-family:'Kanit',sans-serif;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 15% 40%,rgba(123,94,255,0.12),transparent 55%),radial-gradient(ellipse at 85% 10%,rgba(31,199,212,0.06),transparent 50%);pointer-events:none;z-index:0}

/* SCROLLBAR */
::-webkit-scrollbar{height:4px;width:4px}
::-webkit-scrollbar-track{background:var(--surface)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* HEADER */
.header{background:rgba(19,13,40,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;gap:12px}
.logo{display:flex;align-items:center;gap:8px;flex-shrink:0}
.logo-badge{width:30px;height:30px;background:linear-gradient(135deg,#FFD700,#FFA500);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#000}
.logo-name{font-size:16px;font-weight:800;color:var(--gold);letter-spacing:1px}
.logo-sub{font-size:9px;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:2px}
.price-bar{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;flex:1;justify-content:center}
.price-bar::-webkit-scrollbar{display:none}
.price-chip{display:flex;align-items:center;gap:6px;padding:5px 10px;border-radius:16px;background:var(--surface2);border:1px solid var(--border);font-size:11px;white-space:nowrap;cursor:pointer;transition:all 0.2s}
.price-chip.active{background:var(--gold-dim);border-color:rgba(255,215,0,0.4);color:var(--gold)}
.price-chip-val{font-family:'DM Mono',monospace;font-weight:700;font-size:12px}
.header-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
.timer-badge{display:flex;align-items:center;gap:6px;padding:5px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:16px;font-family:'DM Mono',monospace;font-size:13px;font-weight:700;color:var(--gold)}
.timer-badge-sub{font-size:10px;color:var(--muted);font-weight:400;margin-left:2px}
.btn-connect{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;border:none;padding:7px 16px;border-radius:16px;font-family:'Kanit',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all 0.2s;letter-spacing:0.5px;white-space:nowrap}
.btn-connect:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(255,215,0,0.3)}
.wallet-pill{display:flex;align-items:center;gap:6px;padding:6px 12px;border:1px solid rgba(255,215,0,0.3);border-radius:16px;font-size:11px;color:var(--gold);cursor:pointer;background:var(--gold-dim);font-family:'DM Mono',monospace}
.wallet-dot{width:6px;height:6px;border-radius:50%;background:#1FC7D4;box-shadow:0 0 6px #1FC7D4}

/* CARRUSEL */
.carousel-section{padding:24px 0 8px;position:relative;z-index:1}
.carousel-track{display:flex;gap:12px;padding:8px 0 16px;overflow-x:auto;scroll-snap-type:x mandatory;scrollbar-width:none;-ms-overflow-style:none;align-items:center;cursor:grab}
.carousel-track:active{cursor:grabbing}
.carousel-track::-webkit-scrollbar{display:none}
.carousel-padding{flex-shrink:0;width:calc(50vw - 150px)}

/* TARJETA BASE */
.card{flex-shrink:0;border-radius:24px;display:flex;flex-direction:column;scroll-snap-align:center;transition:transform 0.3s,box-shadow 0.3s;position:relative;overflow:visible;user-select:none}
.card:hover{transform:translateY(-2px)}

/* EXPIRADA */
.card-exp{width:200px;background:var(--surface);border:1px solid var(--border);opacity:0.6}
.card-exp:hover{opacity:0.8}

/* LIVE */
.card-live{width:295px;background:linear-gradient(160deg,#1E1538,#150F2E);border:2px solid var(--live);box-shadow:0 0 0 1px rgba(123,94,255,0.1),0 20px 60px rgba(0,0,0,0.6),0 0 40px var(--live-dim)}
.card-live::before{content:'LIVE';position:absolute;top:-12px;left:50%;transform:translateX(-50%);background:var(--live);color:#fff;font-size:10px;font-weight:700;padding:3px 12px;border-radius:10px;letter-spacing:2px}

/* NEXT */
.card-next{width:240px;background:var(--surface);border:2px solid var(--surface2)}

/* LATER */
.card-later{width:120px;background:var(--surface);border:1px solid var(--border);opacity:0.35;align-items:center;justify-content:center;padding:20px;gap:6px;min-height:300px}

/* PENTÁGONO UP */
.penta-up{position:relative;background:var(--up-dim);border:1px solid rgba(31,199,212,0.3);border-radius:12px 12px 0 0;padding:10px 16px;text-align:center;margin:0;clip-path:polygon(0 0,100% 0,100% 75%,50% 100%,0 75%)}
.penta-up.winner{background:rgba(31,199,212,0.25);border-color:rgba(31,199,212,0.6)}
.penta-dn{position:relative;background:var(--dn-dim);border:1px solid rgba(237,75,158,0.3);border-radius:0 0 12px 12px;padding:10px 16px;text-align:center;margin:0;clip-path:polygon(0 25%,50% 0,100% 25%,100% 100%,0 100%)}
.penta-dn.winner{background:rgba(237,75,158,0.25);border-color:rgba(237,75,158,0.6)}
.penta-dir{font-size:15px;font-weight:800;letter-spacing:2px;margin-bottom:2px;padding-top:4px}
.penta-dir.up{color:var(--up)}
.penta-dir.dn{color:var(--dn);padding-top:8px}
.penta-mult{font-size:11px;font-weight:600;opacity:0.85}
.penta-mult.up{color:var(--up)}
.penta-mult.dn{color:var(--dn);padding-bottom:4px}

/* CUERPO TARJETA */
.card-body{padding:12px 14px;flex:1;display:flex;flex-direction:column;gap:6px}
.card-tag-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px}
.tag-live-dot{width:7px;height:7px;border-radius:50%;background:var(--live);box-shadow:0 0 8px var(--live);animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.tag-txt{font-size:11px;font-weight:700;letter-spacing:1px;color:var(--muted)}
.card-num-txt{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace}
.price-center{text-align:center;padding:8px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin:4px 0}
.price-label-sm{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:2px;font-family:'DM Mono',monospace}
.price-main{font-size:24px;font-weight:800;font-family:'DM Mono',monospace;letter-spacing:-0.5px}
.card-live .price-main{font-size:28px;color:var(--up)}
.price-delta{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700;margin-top:3px;font-family:'DM Mono',monospace}
.price-delta.up{background:rgba(31,199,212,0.15);color:var(--up)}
.price-delta.dn{background:rgba(237,75,158,0.15);color:var(--dn)}
.info-row{display:flex;justify-content:space-between;font-size:11px}
.info-lbl{color:var(--muted)}
.info-val{font-family:'DM Mono',monospace;font-weight:600}
.info-val.gold{color:var(--gold)}

/* POOL BAR */
.pool-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;display:flex;margin:4px 0}
.pool-bar-u{background:var(--up);height:100%;transition:width 0.6s}
.pool-bar-d{background:var(--dn);height:100%;transition:width 0.6s}
.pool-pcts{display:flex;justify-content:space-between;font-size:10px;font-family:'DM Mono',monospace}
.pool-pct-u{color:var(--up)}
.pool-pct-d{color:var(--dn)}

/* BOTONES */
.bet-btns{display:flex;flex-direction:column;gap:7px;margin-top:auto;padding-top:8px}
.btn-up{padding:11px;border-radius:12px;border:none;background:var(--up);color:#000;font-family:'Kanit',sans-serif;font-size:14px;font-weight:800;cursor:pointer;transition:all 0.2s;letter-spacing:0.5px}
.btn-up:hover:not(:disabled){box-shadow:0 0 20px rgba(31,199,212,0.5);transform:translateY(-1px)}
.btn-up:disabled{opacity:0.3;cursor:not-allowed;transform:none}
.btn-dn{padding:11px;border-radius:12px;border:none;background:var(--dn);color:#fff;font-family:'Kanit',sans-serif;font-size:14px;font-weight:800;cursor:pointer;transition:all 0.2s;letter-spacing:0.5px}
.btn-dn:hover:not(:disabled){box-shadow:0 0 20px rgba(237,75,158,0.5);transform:translateY(-1px)}
.btn-dn:disabled{opacity:0.3;cursor:not-allowed;transform:none}
.entrado-badge{text-align:center;padding:10px;border-radius:10px;background:var(--gold-dim);border:1px solid rgba(255,215,0,0.3);color:var(--gold);font-size:13px;font-weight:700;letter-spacing:1px;margin-top:auto}

/* NO ROUND */
.no-round{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:6px;padding:20px 0;min-height:200px}
.no-round-icon{font-size:32px;margin-bottom:4px}

/* CONN DROPDOWN */
.conn-drop{position:fixed;top:64px;right:16px;z-index:200;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px;width:260px;box-shadow:0 20px 60px rgba(0,0,0,0.8);animation:fadeIn 0.15s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.conn-title{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;font-family:'DM Mono',monospace}
.conn-opt{width:100%;padding:11px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Kanit',sans-serif;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:6px;text-align:left;display:flex;align-items:center;gap:10px;transition:all 0.2s}
.conn-opt:hover{border-color:var(--gold);color:var(--gold)}
.conn-ghost{width:100%;padding:7px;background:transparent;border:none;color:var(--muted);font-family:'DM Mono',monospace;font-size:10px;cursor:pointer;letter-spacing:1px;text-align:center}
.conn-ghost:hover{color:var(--text)}
.conn-err{font-size:11px;margin-top:8px;line-height:1.6;font-family:'DM Mono',monospace;color:var(--dn)}
.conn-info{font-size:11px;margin-top:8px;line-height:1.6;font-family:'DM Mono',monospace;color:var(--gold)}

/* BOTTOM */
.bottom{max-width:1000px;margin:0 auto;padding:0 16px 40px;position:relative;z-index:1}

/* ADMIN */
.admin-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.admin-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px}
.admin-title{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;font-family:'DM Mono',monospace}
.asset-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.asset-chip{padding:5px 12px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Kanit',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s}
.asset-chip.sel{border-color:var(--gold);color:var(--gold);background:var(--gold-dim)}
.btn-admin{width:100%;padding:10px;border-radius:10px;font-family:'Kanit',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all 0.2s;margin-bottom:6px;border:none;letter-spacing:0.5px}
.btn-open{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000}
.btn-open:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(255,215,0,0.3)}
.btn-open:disabled{opacity:0.3;cursor:not-allowed;transform:none}
.btn-resolve{background:transparent;border:1px solid var(--border);color:var(--muted)}
.btn-resolve:hover{border-color:var(--text);color:var(--text)}
.btn-resolve:disabled{opacity:0.3;cursor:not-allowed}

/* HISTORIAL */
.hist-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.hist-head{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.hist-title{font-size:13px;font-weight:700;letter-spacing:0.5px}
.hist-sub{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:1px}
table{width:100%;border-collapse:collapse;font-size:11px}
th{text-align:left;padding:10px 18px;color:var(--muted);font-size:10px;letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid var(--border);font-family:'DM Mono',monospace;font-weight:400}
td{padding:11px 18px;border-bottom:1px solid var(--muted2);font-family:'DM Mono',monospace}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,0.02)}
.badge-up{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;background:rgba(31,199,212,0.12);color:var(--up);border:1px solid rgba(31,199,212,0.25)}
.badge-dn{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;background:rgba(237,75,158,0.12);color:var(--dn);border:1px solid rgba(237,75,158,0.25)}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.8);backdrop-filter:blur(10px);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn 0.15s ease}
.modal-box{background:var(--surface);border-radius:20px;padding:26px;width:100%;max-width:370px;position:relative;border:1px solid var(--border)}
.modal-box.up{border-top:3px solid var(--up);box-shadow:0 0 30px rgba(31,199,212,0.12)}
.modal-box.dn{border-top:3px solid var(--dn);box-shadow:0 0 30px rgba(237,75,158,0.12)}
.modal-close{position:absolute;top:14px;right:14px;background:var(--surface2);border:none;color:var(--muted);cursor:pointer;width:26px;height:26px;border-radius:8px;font-size:13px;display:flex;align-items:center;justify-content:center}
.modal-close:hover{color:var(--text)}
.modal-dir{font-size:26px;font-weight:800;letter-spacing:2px;margin-bottom:2px}
.modal-dir.up{color:var(--up)}
.modal-dir.dn{color:var(--dn)}
.modal-sub{font-size:11px;color:var(--muted);margin-bottom:18px;font-family:'DM Mono',monospace;letter-spacing:1px}
.price-ref{display:flex;justify-content:space-between;padding:9px 13px;background:var(--bg2);border-radius:10px;margin-bottom:14px;font-size:12px;border:1px solid var(--border)}
.price-ref-val{color:var(--gold);font-weight:700;font-family:'DM Mono',monospace}
.field{margin-bottom:10px}
.field label{display:block;font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;font-family:'DM Mono',monospace}
.field input{width:100%;background:var(--bg2);border:1px solid var(--border);color:var(--text);font-family:'DM Mono',monospace;font-size:15px;padding:9px 13px;border-radius:10px;outline:none;transition:border-color 0.2s}
.field input:focus{border-color:var(--gold)}
.field-hint{font-size:10px;color:var(--muted);margin-top:4px;font-family:'DM Mono',monospace}
.or-div{text-align:center;font-size:11px;color:var(--muted);margin:6px 0 10px;letter-spacing:1px}
.btn-confirm{width:100%;padding:13px;border-radius:12px;border:none;font-family:'Kanit',sans-serif;font-size:16px;font-weight:800;cursor:pointer;transition:all 0.2s;letter-spacing:1px;margin-top:4px}
.btn-confirm.up{background:var(--up);color:#000}
.btn-confirm.up:hover{box-shadow:0 0 20px rgba(31,199,212,0.4);transform:translateY(-1px)}
.btn-confirm.dn{background:var(--dn);color:#fff}
.btn-confirm.dn:hover{box-shadow:0 0 20px rgba(237,75,158,0.4);transform:translateY(-1px)}
.btn-confirm:disabled{opacity:0.4;cursor:not-allowed;transform:none}
.modal-st{margin-top:10px;padding:9px 13px;border-radius:8px;font-size:11px;line-height:1.7;font-family:'DM Mono',monospace}
.modal-st.ok{background:rgba(31,199,212,0.08);border:1px solid rgba(31,199,212,0.2);color:var(--up)}
.modal-st.err{background:rgba(237,75,158,0.08);border:1px solid rgba(237,75,158,0.2);color:var(--dn)}
.modal-st.info{background:var(--gold-dim);border:1px solid rgba(255,215,0,0.2);color:var(--gold)}

/* TOAST */
.toast-wrap{position:fixed;bottom:20px;right:20px;z-index:400;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast-item{background:var(--surface2);border-radius:10px;padding:10px 18px;font-size:12px;font-family:'DM Mono',monospace;letter-spacing:0.5px;border:1px solid var(--border);animation:slideUp 0.3s ease;pointer-events:none}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.toast-item.ok{border-color:rgba(31,199,212,0.4);color:var(--up)}
.toast-item.err{border-color:rgba(237,75,158,0.4);color:var(--dn)}
.toast-item.info{border-color:rgba(255,215,0,0.4);color:var(--gold)}

.spinner{display:inline-block;width:11px;height:11px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:5px}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:600px){
  .price-bar{display:none}
  .admin-grid{grid-template-columns:1fr}
  .carousel-padding{width:20px}
}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── CONFIG ──────────────────────────────────────────────────
const CFG = {
  CONTRATO_VEGAS: '0x76d19Ed4Aaba2ee40D522dBC9325DD2d45a44251',
  CONTRATO_CNKT:  '0x87bdfbe98Ba55104701b2F2e999982a317905637',
  POLYGON_CHAIN:  '0x89',

const ASSETS = ['BTC','ETH','SOL','BNB','MATIC'];
const ABI_V = [
  {inputs:[{internalType:"uint8",name:"_asset",type:"uint8"}],name:"openRound",outputs:[],stateMutability:"nonpayable",type:"function"},
  {inputs:[{internalType:"uint256",name:"_roundId",type:"uint256"},{internalType:"uint8",name:"_direction",type:"uint8"},{internalType:"uint256",name:"_amount",type:"uint256"}],name:"placeBet",outputs:[],stateMutability:"nonpayable",type:"function"},
  {inputs:[{internalType:"uint256",name:"_roundId",type:"uint256"}],name:"resolveRound",outputs:[],stateMutability:"nonpayable",type:"function"},
  {inputs:[],name:"currentRoundId",outputs:[{internalType:"uint256",name:"",type:"uint256"}],stateMutability:"view",type:"function"},
  {inputs:[{internalType:"uint256",name:"_roundId",type:"uint256"}],name:"getRoundInfo",outputs:[{components:[{internalType:"uint256",name:"id",type:"uint256"},{internalType:"uint8",name:"asset",type:"uint8"},{internalType:"uint8",name:"status",type:"uint8"},{internalType:"uint256",name:"openTime",type:"uint256"},{internalType:"uint256",name:"closeTime",type:"uint256"},{internalType:"uint256",name:"resolveTime",type:"uint256"},{internalType:"int256",name:"priceAtOpen",type:"int256"},{internalType:"int256",name:"priceAtClose",type:"int256"},{internalType:"uint256",name:"totalSube",type:"uint256"},{internalType:"uint256",name:"totalBaja",type:"uint256"},{internalType:"uint256",name:"totalPool",type:"uint256"},{internalType:"uint8",name:"result",type:"uint8"}],internalType:"struct ProyectoVegas.Round",name:"",type:"tuple"}],stateMutability:"view",type:"function"},
  {inputs:[{internalType:"uint256",name:"_roundId",type:"uint256"},{internalType:"address",name:"",type:"address"}],name:"hasBet",outputs:[{internalType:"bool",name:"",type:"bool"}],stateMutability:"view",type:"function"},
  {inputs:[],name:"owner",outputs:[{internalType:"address",name:"",type:"address"}],stateMutability:"view",type:"function"},
  {inputs:[{internalType:"uint8",name:"_asset",type:"uint8"}],name:"getPrice",outputs:[{internalType:"int256",name:"",type:"int256"}],stateMutability:"view",type:"function"},
];
const ABI_E = [
  {inputs:[{internalType:"address",name:"spender",type:"address"},{internalType:"uint256",name:"amount",type:"uint256"}],name:"approve",outputs:[{internalType:"bool",name:"",type:"bool"}],stateMutability:"nonpayable",type:"function"},
  {inputs:[{internalType:"address",name:"account",type:"address"}],name:"balanceOf",outputs:[{internalType:"uint256",name:"",type:"uint256"}],stateMutability:"view",type:"function"},
  {inputs:[{internalType:"address",name:"owner",type:"address"},{internalType:"address",name:"spender",type:"address"}],name:"allowance",outputs:[{internalType:"uint256",name:"",type:"uint256"}],stateMutability:"view",type:"function"},
];

// ── UTILS ────────────────────────────────────────────────────
const fUSD = v => '$' + parseFloat(v).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const fCNKT = (web3,wei) => parseFloat(web3.utils.fromWei(wei.toString(),'ether')).toFixed(2);
const fPool = (web3,wei) => parseFloat(web3.utils.fromWei(wei.toString(),'ether')).toFixed(2) + ' CNKT+';
const tLeft = ct => Math.max(0, parseInt(ct) - Math.floor(Date.now()/1000));
const fTime = s => String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');
const calcMult = (web3,total,side) => {
  try {
    const t = parseFloat(web3.utils.fromWei(total.toString(),'ether'));
    const s = parseFloat(web3.utils.fromWei(side.toString(),'ether'));
    if(!t||!s) return '—';
    return (t*0.95/s).toFixed(2) + 'x';
  } catch(e){ return '—'; }
};

function CardLive({ ronda, rid, wallet, soloLectura, web3, contrato, onBet }) {

  const [timer, setTimer] = useState('--:--');
  const [yaBet, setYaBet] = useState(false);
  const [btnsEnabled, setBtnsEnabled] = useState(false);

  useEffect(() => {
    if (!ronda || !web3) return;
    // Precio actual
    const fetchPrecio = async () => {

        setPrecio(parseInt(p)/1e8);

    };
    fetchPrecio();

    // Timer
    const ti = setInterval(() => {
      const r = tLeft(ronda.closeTime);
      setTimer(fTime(r));

    }, 1000);
    setTimer(fTime(tLeft(ronda.closeTime)));

// ── MODAL ENTRADA ─────────────────────────────────────────────
function Modal({ dir, rid, asset, precioCNKT, web3, contrato, contratoE, wallet, onClose, onSuccess }) {
  const [cnkt, setCnkt] = useState('');
  const [usd, setUsd] = useState('');
  const [hint, setHint] = useState({txt:'Min 500 · Max 250,000', color:'var(--muted)'});
  const [status, setStatus] = useState(null); // {msg, tipo}
  const [loading, setLoading] = useState(false);
  const isUp = dir === 'SUBE';

  const updateHint = (c) => {
    if(c>0&&c<500) setHint({txt:'⚠ Mínimo 500 CNKT+', color:'var(--dn)'});
    else if(c>250000) setHint({txt:'⚠ Máximo 250,000', color:'var(--dn)'});
    else if(c>=500) setHint({txt:`✓ ≈ $${(c*precioCNKT).toFixed(2)} USD`, color:'var(--up)'});
    else setHint({txt:'Min 500 · Max 250,000', color:'var(--muted)'});
  };

  const onCNKT = e => {
    const v = e.target.value; setCnkt(v);
    const c = parseFloat(v)||0;
    setUsd(c>0 ? (c*precioCNKT).toFixed(4) : '');
    updateHint(c);
  };
  const onUSD = e => {
    const v = e.target.value; setUsd(v);
    const u = parseFloat(v)||0;
    const c = u>0&&precioCNKT>0 ? Math.round(u/precioCNKT) : '';
    setCnkt(c); updateHint(parseFloat(c)||0);
  };

  const confirm = async () => {
    const c = parseFloat(cnkt);
    if(!c||c<500||c>250000){setStatus({msg:'Monto inválido (500–250,000 CNKT+)',tipo:'err'});return}
    const amountWei = web3.utils.toWei(c.toString(),'ether');
    const dirNum = isUp ? 0 : 1;
    setLoading(true);
    try {
      setStatus({msg:'Paso 1/2: Aprobando CNKT+...',tipo:'info'});
      const al = await contratoE.methods.allowance(wallet, CFG.CONTRATO_VEGAS).call();
      if(BigInt(al) < BigInt(amountWei))
        await contratoE.methods.approve(CFG.CONTRATO_VEGAS, amountWei).send({from:wallet});
      setStatus({msg:'Paso 2/2: Enviando entrada...',tipo:'info'});
      await contrato.methods.placeBet(rid, dirNum, amountWei).send({from:wallet});
      setStatus({msg:`✓ ${c} CNKT+ registrados correctamente`,tipo:'ok'});
      onSuccess();
      setTimeout(onClose, 2000);
    } catch(e) {
      setStatus({msg:'✗ '+(e.message||e),tipo:'err'});
    }
    setLoading(false);
  };

  return (
    <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className={`modal-box ${isUp?'up':'dn'}`}>
        <button className="modal-close" onClick={onClose}>✕</button>
        <div className={`modal-dir ${isUp?'up':'dn'}`}>{isUp?'▲ UP — SUBE':'▼ DOWN — BAJA'}</div>
        <div className="modal-sub">Ronda #{rid} · {asset}</div>
        <div className="price-ref">
          <span style={{color:'var(--muted)',fontSize:12}}>Precio CNKT+</span>
          <span className="price-ref-val">${precioCNKT.toFixed(6)}</span>
        </div>
        <div className="field">
          <label>CNKT+ a ingresar</label>
          <input type="number" value={cnkt} onChange={onCNKT} placeholder="500" min="500"/>
          <div className="field-hint" style={{color:hint.color}}>{hint.txt}</div>
        </div>
        <div className="or-div">— o escribe en USD —</div>
        <div className="field">
          <label>Equivalente USD</label>
          <input type="number" value={usd} onChange={onUSD} placeholder="0.00" step="0.01"/>
        </div>
        <button className={`btn-confirm ${isUp?'up':'dn'}`} onClick={confirm} disabled={loading}>
          {loading ? <span><span className="spinner"/>Procesando...</span> : `CONFIRMAR ${isUp?'▲ UP':'▼ DOWN'}`}
        </button>
        {status && <div className={`modal-st ${status.tipo}`}>{status.msg}</div>}
      </div>
    </div>
  );
}

function App() {
  const [web3, setWeb3] = useState(null);

  const [contratoE, setContratoE] = useState(null);
  const [wallet, setWallet] = useState(null);
  const [esOwner, setEsOwner] = useState(false);
  const [soloLectura, setSoloLectura] = useState(true);
  const [showConn, setShowConn] = useState(false);
  const [connErr, setConnErr] = useState('');

  const [rondas, setRondas] = useState({live:null, liveId:null, exp1:null, exp1Id:null, exp2:null, exp2Id:null});
  const [historial, setHistorial] = useState([]);
  const [precioBTC, setPrecioBTC] = useState(null);
  const [precioCNKT, setPrecioCNKT] = useState(0.00142);
  const [timer, setTimer] = useState('--:--');

  const [modal, setModal] = useState(null); // {dir}
  const [toasts, setToasts] = useState([]);
  const [selAsset, setSelAsset] = useState(0);
  const [adminLoading, setAdminLoading] = useState('');

  const carouselRef = useRef(null);

  // Toast
  const addToast = useCallback((msg, tipo='ok') => {
    const id = Date.now();
    setToasts(t => [...t, {id,msg,tipo}]);
    setTimeout(() => setToasts(t => t.filter(x=>x.id!==id)), 3500);
  }, []);

  // Init Web3
  const initWeb3 = useCallback(async (provider, addr, lectura=false) => {
    const w3 = new Web3(provider);
    const cv = new w3.eth.Contract(ABI_V, CFG.CONTRATO_VEGAS);
    const ce = new w3.eth.Contract(ABI_E, CFG.CONTRATO_CNKT);
    window._web3 = w3;
    setWeb3(w3); setContrato(cv); setContratoE(ce);
    setWallet(addr); setSoloLectura(lectura);
    if(!lectura && addr) {
      const owner = await cv.methods.owner().call();
      setEsOwner(owner.toLowerCase() === addr.toLowerCase());
    }
    return {w3, cv, ce};
  }, []);

  // Precio CNKT
  const fetchPrecioCNKT = useCallback(async () => {
    try {
      const r = await fetch('/precio-cnkt');
      const d = await r.json();
      if(d?.ok && d?.precio) setPrecioCNKT(d.precio);
    } catch(e){}
  }, []);

  // Cargar rondas
  const cargarRondas = useCallback(async (cv, w3) => {
    if(!cv || !w3) return;
    try {
      const rid = parseInt(await cv.methods.currentRoundId().call());
      let live=null, exp1=null, exp2=null;
      if(rid>0) live = await cv.methods.getRoundInfo(rid).call();
      if(rid>1) exp1 = await cv.methods.getRoundInfo(rid-1).call();
      if(rid>2) exp2 = await cv.methods.getRoundInfo(rid-2).call();
      setRondas({live: live&&(live.status==='0'||live.status===0)?live:null, liveId:rid, exp1, exp1Id:rid>1?rid-1:null, exp2, exp2Id:rid>2?rid-2:null});
      // Precio BTC del oráculo
      if(live&&(live.status==='0'||live.status===0)){
        try{
          const p = await cv.methods.getPrice(parseInt(live.asset)).call();
          setPrecioBTC(parseInt(p)/1e8);
        }catch(e){}
      }
      // Timer
      if(live&&(live.status==='0'||live.status===0)){
        setTimer(fTime(tLeft(live.closeTime)));
      }
    } catch(e){}
  }, []);

  // Cargar historial
  const cargarHistorial = useCallback(async (cv, w3) => {
    if(!cv||!w3) return;
    try {
      const rid = parseInt(await cv.methods.currentRoundId().call());
      if(rid===0){setHistorial([]);return}
      const ini = Math.max(1, rid-9);
      const ps = [];
      for(let i=rid;i>=ini;i--) ps.push(cv.methods.getRoundInfo(i).call().then(r=>({r,id:i})));
      const res = await Promise.all(ps);
      setHistorial(res);
    } catch(e){}
  }, []);

  // Cargar todo
  const cargarTodo = useCallback((cv, w3) => {
    cargarRondas(cv, w3);
    cargarHistorial(cv, w3);
  }, [cargarRondas, cargarHistorial]);

  // Auto-carga inicial
  useEffect(() => {
    const w3 = new Web3(new Web3.providers.HttpProvider(CFG.RPC));

    return (
      <table>
        <thead><tr><th>Ronda</th><th>Activo</th><th>Apertura</th><th>Cierre</th><th>Pool</th><th>Resultado</th><th>Estado</th></tr></thead>
        <tbody>
          {historial.map(({r,id}) => {
            const st = parseInt(r.status);
            const pA = fUSD(parseInt(r.priceAtOpen)/1e8);
            const pC = r.priceAtClose!=='0' ? fUSD(parseInt(r.priceAtClose)/1e8) : '—';
            const pool = web3 ? parseFloat(web3.utils.fromWei(r.totalPool.toString(),'ether')).toFixed(2) : '—';
            const res = st===2 ? (parseInt(r.result)===0 ? <span className="badge-up">▲ UP</span> : <span className="badge-dn">▼ DOWN</span>) : '—';
            return (
              <tr key={id}>
                <td style={{color:'var(--muted)'}}>#{id}</td>
                <td style={{fontWeight:700,color:'var(--gold)',fontFamily:'Kanit,sans-serif'}}>{ASSETS[parseInt(r.asset)]}</td>
                <td>{pA}</td><td>{pC}</td><td>{pool} CNKT+</td><td>{res}</td>
                <td style={{color:sC[st],fontSize:11}}>{sL[st]}</td>
              </tr>
            );
          })}
        </tbody>
      </table>
    );
  };

  return (
    <>
      {/* HEADER */}
      <header className="header">
        <div className="logo">
          <div className="logo-badge">C+</div>
          <div>
            <div className="logo-name">CNKT <span style={{color:'var(--muted)',fontSize:12,fontWeight:400}}>by EVOX</span></div>
          </div>
        </div>

        <div className="price-bar">
          <div className="price-chip active">
            <span>₿</span>
            <span className="price-chip-val">{precioBTC ? fUSD(precioBTC) : '—'}</span>
            <span style={{fontSize:10,color:'var(--muted)'}}>BTC</span>
          </div>
          <div className="price-chip">
            <span style={{fontSize:10,color:'var(--gold)'}}>CNKT+</span>
            <span className="price-chip-val" style={{color:'var(--gold)'}}>${precioCNKT.toFixed(6)}</span>
          </div>
        </div>

        <div className="header-actions">
          <div className="timer-badge">
            {timer} <span className="timer-badge-sub">5m</span>
          </div>
          {!soloLectura && wallet ? (
            <div className="wallet-pill" onClick={()=>setShowConn(!showConn)}>
              <div className="wallet-dot"/>
              {wallet.slice(0,6)}...{wallet.slice(-4)}
            </div>
          ) : (
            <button className="btn-connect" onClick={()=>setShowConn(!showConn)}>CONECTAR</button>
          )}
        </div>
      </header>

      {/* CONN DROPDOWN */}
      {showConn && (
        <>
          <div style={{position:'fixed',inset:0,zIndex:199}} onClick={()=>setShowConn(false)}/>
          <ConnDropdown onMM={conectarMM} onMovil={conectarMovil} onVer={soloVer} error={connErr}/>
        </>
      )}

      {/* CARRUSEL */}
      <div className="carousel-section">
        <div className="carousel-track" ref={carouselRef}>
          <div className="carousel-padding"/>

          <CardExpired ronda={rondas.exp2} id={rondas.exp2Id}/>
          <CardExpired ronda={rondas.exp1} id={rondas.exp1Id}/>

          <CardLive
            ronda={rondas.live}
            rid={rondas.liveId}
            wallet={!soloLectura?wallet:null}
            soloLectura={soloLectura}
            web3={web3}
            contrato={contrato}
            onBet={dir => {
              if(soloLectura){addToast('Conecta tu wallet para apostar','info');setShowConn(true);return}
              setModal({dir});
            }}
          />

          <CardNext rid={rondas.liveId ? rondas.liveId+1 : null}/>

          <div className="card card-later">
            <div style={{fontSize:28,opacity:0.4}}>🕐</div>
            <div style={{fontSize:11,color:'var(--muted)',letterSpacing:1,textTransform:'uppercase'}}>Later</div>
            <div style={{fontSize:13,fontWeight:700,fontFamily:'DM Mono,monospace',color:'var(--muted)'}}>~10 min</div>
          </div>

          <div className="carousel-padding"/>
        </div>
      </div>

      {/* BOTTOM */}
      <div className="bottom">

        {/* ADMIN */}
        {esOwner && (
          <div className="admin-grid">
            <div className="admin-card">
              <div className="admin-title">Abrir Ronda</div>
              <div className="asset-chips">
                {ASSETS.map((a,i) => (
                  <button key={a} className={`asset-chip ${selAsset===i?'sel':''}`} onClick={()=>setSelAsset(i)}>{a}</button>
                ))}
              </div>
              <button className="btn-admin btn-open" disabled={adminLoading==='abriendo'} onClick={abrirRonda}>
                {adminLoading==='abriendo' ? '...' : '▶ Abrir Ronda'}
              </button>
            </div>
            <div className="admin-card">
              <div className="admin-title">Resolver Ronda</div>
              <div style={{fontSize:11,color:'var(--muted)',marginBottom:12,lineHeight:1.8,fontFamily:'DM Mono,monospace'}}>Consulta Chainlink y distribuye fondos automáticamente.</div>
              <button className="btn-admin btn-resolve" disabled={adminLoading==='resolviendo'} onClick={resolverRonda}>
                {adminLoading==='resolviendo' ? '...' : '✓ Resolver Ronda'}
              </button>
            </div>
          </div>
        )}

        {/* HISTORIAL */}
        <div className="hist-card">
          <div className="hist-head">
            <div className="hist-title">Historial de Rondas</div>
            <div className="hist-sub">AUTO-ACTUALIZA</div>
          </div>
          {renderHistorial()}
        </div>

      </div>

      {/* MODAL */}
      {modal && contrato && web3 && (
        <Modal
          dir={modal.dir}
          rid={rondas.liveId}
          asset={rondas.live ? ASSETS[parseInt(rondas.live.asset)] : 'BTC'}
          precioCNKT={precioCNKT}
          web3={web3}
          contrato={contrato}
          contratoE={contratoE}
          wallet={wallet}
          onClose={()=>setModal(null)}
          onSuccess={()=>{
            addToast('Entrada '+(modal.dir==='SUBE'?'▲':'▼')+' registrada ✓','ok');
            cargarTodo(contrato,web3);
          }}
        />
      )}

      {/* TOASTS */}
      <div className="toast-wrap">
        {toasts.map(t => <div key={t.id} className={`toast-item ${t.tipo}`}>{t.msg}</div>)}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
