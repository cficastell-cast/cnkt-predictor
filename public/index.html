<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CNKT Predictor by EVOX</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/web3/1.10.0/web3.min.js"></script>
<script src="https://unpkg.com/@lottiefiles/dotlottie-wc@0.9.3/dist/dotlottie-wc.js" type="module"></script>
<style>
:root{
  --bg:#1A1033;--bg2:#130D28;--surface:#1E1538;--surface2:#251C45;--border:#2E2455;
  --gold:#FFD700;--gold2:#FFC200;--gold-dim:rgba(255,215,0,0.12);
  --up:#1FC7D4;--up-dim:rgba(31,199,212,0.15);
  --dn:#ED4B9E;--dn-dim:rgba(237,75,158,0.15);
  --live:#7B5EFF;--live-dim:rgba(123,94,255,0.2);
  --text:#F4EEFF;--muted:#6B5E9A;--muted2:#2E2455;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%}
body{background:var(--bg2);color:var(--text);font-family:'Kanit',sans-serif;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 15% 40%,rgba(123,94,255,0.12),transparent 55%),radial-gradient(ellipse at 85% 10%,rgba(31,199,212,0.06),transparent 50%);pointer-events:none;z-index:0}
::-webkit-scrollbar{height:4px;width:4px}::-webkit-scrollbar-track{background:var(--surface)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.header{background:rgba(19,13,40,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;gap:12px}
.logo{display:flex;align-items:center;gap:8px;flex-shrink:0}
.logo-badge{width:30px;height:30px;background:linear-gradient(135deg,#FFD700,#FFA500);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#000}
.logo-name{font-size:16px;font-weight:800;color:var(--gold);letter-spacing:1px}
.price-bar{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;flex:1;justify-content:center}
.price-bar::-webkit-scrollbar{display:none}
.price-chip{display:flex;align-items:center;gap:6px;padding:5px 10px;border-radius:16px;background:var(--surface2);border:1px solid var(--border);font-size:11px;white-space:nowrap}
.price-chip.active{background:var(--gold-dim);border-color:rgba(255,215,0,0.4);color:var(--gold)}
.price-chip-val{font-family:'DM Mono',monospace;font-weight:700;font-size:12px}
.header-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
.timer-badge{display:flex;align-items:center;gap:6px;padding:5px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:16px;font-family:'DM Mono',monospace;font-size:13px;font-weight:700;color:var(--gold)}
.timer-badge.urgent{color:var(--dn);border-color:rgba(237,75,158,0.4);background:rgba(237,75,158,0.08);animation:timerPulse 0.8s infinite}
@keyframes timerPulse{0%,100%{opacity:1}50%{opacity:0.6}}
.btn-connect{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;border:none;padding:7px 16px;border-radius:16px;font-family:'Kanit',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all 0.2s;letter-spacing:0.5px;white-space:nowrap}
.btn-connect:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(255,215,0,0.3)}
.wallet-pill{display:flex;align-items:center;gap:6px;padding:6px 12px;border:1px solid rgba(255,215,0,0.3);border-radius:16px;font-size:11px;color:var(--gold);cursor:pointer;background:var(--gold-dim);font-family:'DM Mono',monospace}
.wallet-dot{width:6px;height:6px;border-radius:50%;background:#1FC7D4;box-shadow:0 0 6px #1FC7D4}
.carousel-section{padding:24px 0 8px;position:relative;z-index:1}
.carousel-track{display:flex;gap:12px;padding:8px 0 16px;overflow-x:auto;scroll-snap-type:x mandatory;scrollbar-width:none;-ms-overflow-style:none;align-items:center;cursor:grab}
.carousel-track:active{cursor:grabbing}
.carousel-track::-webkit-scrollbar{display:none}
.carousel-padding{flex-shrink:0;width:calc(50vw - 155px)}
.card{flex-shrink:0;border-radius:24px;display:flex;flex-direction:column;scroll-snap-align:center;transition:transform 0.3s,box-shadow 0.3s;position:relative;overflow:visible;user-select:none}
.card:hover{transform:translateY(-2px)}
.card-exp{width:210px;background:var(--surface);border:1px solid var(--border);opacity:0.7}
.card-exp:hover{opacity:0.9}
.card-live{width:300px;background:linear-gradient(160deg,#1E1538,#150F2E);border:2px solid var(--live);box-shadow:0 0 0 1px rgba(123,94,255,0.1),0 20px 60px rgba(0,0,0,0.6),0 0 40px var(--live-dim)}
.card-live::before{content:'LIVE';position:absolute;top:-12px;left:50%;transform:translateX(-50%);background:var(--live);color:#fff;font-size:10px;font-weight:700;padding:3px 12px;border-radius:10px;letter-spacing:2px}
.card-next{width:240px;background:var(--surface);border:2px solid var(--surface2)}
.card-later{width:120px;background:var(--surface);border:1px solid var(--border);opacity:0.35;align-items:center;justify-content:center;padding:20px;gap:6px;min-height:300px}
.penta-up{background:var(--up-dim);border:1px solid rgba(31,199,212,0.3);border-radius:12px 12px 0 0;padding:10px 16px;text-align:center;clip-path:polygon(0 0,100% 0,100% 75%,50% 100%,0 75%)}
.penta-up.winner{background:rgba(31,199,212,0.3);border-color:rgba(31,199,212,0.7);box-shadow:0 0 20px rgba(31,199,212,0.2)}
.penta-up.loser{background:rgba(255,255,255,0.02);border-color:rgba(255,255,255,0.08)}
.penta-dn{background:var(--dn-dim);border:1px solid rgba(237,75,158,0.3);border-radius:0 0 12px 12px;padding:10px 16px;text-align:center;clip-path:polygon(0 25%,50% 0,100% 25%,100% 100%,0 100%)}
.penta-dn.winner{background:rgba(237,75,158,0.3);border-color:rgba(237,75,158,0.7);box-shadow:0 0 20px rgba(237,75,158,0.2)}
.penta-dn.loser{background:rgba(255,255,255,0.02);border-color:rgba(255,255,255,0.08)}
.penta-dir{font-size:15px;font-weight:800;letter-spacing:2px;margin-bottom:2px;padding-top:4px}
.penta-dir.up{color:var(--up)}
.penta-dir.dn{color:var(--dn);padding-top:8px}
.penta-mult{font-size:11px;font-weight:600}
.penta-mult.up{color:var(--up)}
.penta-mult.dn{color:var(--dn);padding-bottom:4px}
.card-body{padding:12px 14px;flex:1;display:flex;flex-direction:column;gap:6px}
.card-tag-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px}
.tag-live-dot{width:7px;height:7px;border-radius:50%;background:var(--live);box-shadow:0 0 8px var(--live);animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.tag-txt{font-size:11px;font-weight:700;letter-spacing:1px;color:var(--muted)}
.card-num-txt{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace}
.price-center{text-align:center;padding:8px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin:4px 0}
.price-label-sm{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:2px;font-family:'DM Mono',monospace}
.price-main{font-size:22px;font-weight:800;font-family:'DM Mono',monospace;letter-spacing:-0.5px}
.card-live .price-main{font-size:28px;color:var(--up)}
.price-delta{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700;margin-top:3px;font-family:'DM Mono',monospace}
.price-delta.up{background:rgba(31,199,212,0.15);color:var(--up)}
.price-delta.dn{background:rgba(237,75,158,0.15);color:var(--dn)}
.info-row{display:flex;justify-content:space-between;font-size:11px}
.info-lbl{color:var(--muted)}
.info-val{font-family:'DM Mono',monospace;font-weight:600}
.info-val.gold{color:var(--gold)}
.pool-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;display:flex;margin:4px 0}
.pool-bar-u{background:var(--up);height:100%;transition:width 0.6s}
.pool-bar-d{background:var(--dn);height:100%;transition:width 0.6s}
.pool-pcts{display:flex;justify-content:space-between;font-size:10px;font-family:'DM Mono',monospace}
.pool-pct-u{color:var(--up)}
.pool-pct-d{color:var(--dn)}
.banner-closed{background:rgba(237,75,158,0.1);border:1px solid rgba(237,75,158,0.35);border-radius:8px;padding:7px 10px;text-align:center;font-size:11px;font-weight:700;color:var(--dn);letter-spacing:1px;margin:4px 0;animation:pulse 1.5s infinite}
@keyframes calcPulse{0%{opacity:0.4;box-shadow:0 0 0px rgba(123,94,255,0)}50%{opacity:1;box-shadow:0 0 16px rgba(123,94,255,0.3)}100%{opacity:0.4;box-shadow:0 0 0px rgba(123,94,255,0)}}
.bet-btns{display:flex;flex-direction:column;gap:7px;margin-top:auto;padding-top:8px}
.btn-up{padding:11px;border-radius:12px;border:none;background:var(--up);color:#000;font-family:'Kanit',sans-serif;font-size:14px;font-weight:800;cursor:pointer;transition:all 0.3s;letter-spacing:0.5px}
.btn-up:hover:not(:disabled){box-shadow:0 0 20px rgba(31,199,212,0.5);transform:translateY(-1px)}
.btn-up:disabled{opacity:0.22;cursor:not-allowed;transform:none;filter:grayscale(0.7)}
.btn-dn{padding:11px;border-radius:12px;border:none;background:var(--dn);color:#fff;font-family:'Kanit',sans-serif;font-size:14px;font-weight:800;cursor:pointer;transition:all 0.3s;letter-spacing:0.5px}
.btn-dn:hover:not(:disabled){box-shadow:0 0 20px rgba(237,75,158,0.5);transform:translateY(-1px)}
.btn-dn:disabled{opacity:0.22;cursor:not-allowed;transform:none;filter:grayscale(0.7)}
.entrado-badge{text-align:center;padding:10px;border-radius:10px;background:var(--gold-dim);border:1px solid rgba(255,215,0,0.3);color:var(--gold);font-size:13px;font-weight:700;letter-spacing:1px;margin-top:auto}
.no-round{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:6px;padding:20px 0;min-height:200px}
.conn-drop{position:fixed;top:64px;right:16px;z-index:200;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px;width:270px;box-shadow:0 20px 60px rgba(0,0,0,0.8);animation:fadeIn 0.15s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.conn-title{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;font-family:'DM Mono',monospace}
.conn-opt{width:100%;padding:11px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Kanit',sans-serif;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:6px;text-align:left;display:flex;align-items:center;gap:10px;transition:all 0.2s}
.conn-opt:hover{border-color:var(--gold);color:var(--gold)}
.conn-opt.danger:hover{border-color:var(--dn);color:var(--dn)}
.conn-wallet-addr{padding:10px 14px;background:var(--bg2);border-radius:10px;font-family:'DM Mono',monospace;font-size:11px;color:var(--gold);word-break:break-all;border:1px solid var(--border);margin-bottom:10px;line-height:1.6}
.conn-ghost{width:100%;padding:7px;background:transparent;border:none;color:var(--muted);font-family:'DM Mono',monospace;font-size:10px;cursor:pointer;letter-spacing:1px;text-align:center}
.conn-ghost:hover{color:var(--text)}
.conn-err{font-size:11px;margin-top:8px;line-height:1.6;font-family:'DM Mono',monospace;color:var(--dn)}
.conn-info{font-size:11px;margin-top:8px;line-height:1.6;font-family:'DM Mono',monospace;color:var(--gold)}
.bottom{max-width:1000px;margin:0 auto;padding:0 16px 40px;position:relative;z-index:1}
.admin-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.admin-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px}
.admin-title{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;font-family:'DM Mono',monospace}
.asset-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.asset-chip{padding:5px 12px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Kanit',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s}
.asset-chip.sel{border-color:var(--gold);color:var(--gold);background:var(--gold-dim)}
.btn-admin{width:100%;padding:10px;border-radius:10px;font-family:'Kanit',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all 0.2s;margin-bottom:6px;border:none;letter-spacing:0.5px}
.btn-open{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000}
.btn-open:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(255,215,0,0.3)}
.btn-open:disabled,.btn-resolve:disabled{opacity:0.3;cursor:not-allowed;transform:none}
.btn-resolve{background:transparent;border:1px solid var(--border);color:var(--muted)}
.btn-resolve:hover{border-color:var(--text);color:var(--text)}
.hist-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.hist-head{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.hist-title{font-size:13px;font-weight:700;letter-spacing:0.5px}
.hist-sub{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:1px}
table{width:100%;border-collapse:collapse;font-size:11px}
th{text-align:left;padding:10px 18px;color:var(--muted);font-size:10px;letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid var(--border);font-family:'DM Mono',monospace;font-weight:400}
td{padding:11px 18px;border-bottom:1px solid var(--muted2);font-family:'DM Mono',monospace}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,0.02)}
.badge-up{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;background:rgba(31,199,212,0.12);color:var(--up);border:1px solid rgba(31,199,212,0.25)}
.badge-dn{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;background:rgba(237,75,158,0.12);color:var(--dn);border:1px solid rgba(237,75,158,0.25)}
.badge-cancel{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;background:rgba(107,94,154,0.12);color:var(--muted);border:1px solid rgba(107,94,154,0.25)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.8);backdrop-filter:blur(10px);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn 0.15s ease}
.modal-box{background:var(--surface);border-radius:20px;padding:26px;width:100%;max-width:370px;position:relative;border:1px solid var(--border)}
.modal-box.up{border-top:3px solid var(--up)}
.modal-box.dn{border-top:3px solid var(--dn)}
.modal-close{position:absolute;top:14px;right:14px;background:var(--surface2);border:none;color:var(--muted);cursor:pointer;width:26px;height:26px;border-radius:8px;font-size:13px;display:flex;align-items:center;justify-content:center}
.modal-close:hover{color:var(--text)}
.modal-dir{font-size:26px;font-weight:800;letter-spacing:2px;margin-bottom:2px}
.modal-dir.up{color:var(--up)}
.modal-dir.dn{color:var(--dn)}
.modal-sub{font-size:11px;color:var(--muted);margin-bottom:18px;font-family:'DM Mono',monospace;letter-spacing:1px}
.price-ref{display:flex;justify-content:space-between;padding:9px 13px;background:var(--bg2);border-radius:10px;margin-bottom:14px;font-size:12px;border:1px solid var(--border)}
.price-ref-val{color:var(--gold);font-weight:700;font-family:'DM Mono',monospace}
.field{margin-bottom:10px}
.field label{display:block;font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;font-family:'DM Mono',monospace}
.field input{width:100%;background:var(--bg2);border:1px solid var(--border);color:var(--text);font-family:'DM Mono',monospace;font-size:15px;padding:9px 13px;border-radius:10px;outline:none;transition:border-color 0.2s}
.field input:focus{border-color:var(--gold)}
.field-hint{font-size:10px;color:var(--muted);margin-top:4px;font-family:'DM Mono',monospace}
.or-div{text-align:center;font-size:11px;color:var(--muted);margin:6px 0 10px;letter-spacing:1px}
.btn-confirm{width:100%;padding:13px;border-radius:12px;border:none;font-family:'Kanit',sans-serif;font-size:16px;font-weight:800;cursor:pointer;transition:all 0.2s;letter-spacing:1px;margin-top:4px}
.btn-confirm.up{background:var(--up);color:#000}
.btn-confirm.up:hover{box-shadow:0 0 20px rgba(31,199,212,0.4);transform:translateY(-1px)}
.btn-confirm.dn{background:var(--dn);color:#fff}
.btn-confirm.dn:hover{box-shadow:0 0 20px rgba(237,75,158,0.4);transform:translateY(-1px)}
.btn-confirm:disabled{opacity:0.4;cursor:not-allowed;transform:none}
.modal-st{margin-top:10px;padding:9px 13px;border-radius:8px;font-size:11px;line-height:1.7;font-family:'DM Mono',monospace}
.modal-st.ok{background:rgba(31,199,212,0.08);border:1px solid rgba(31,199,212,0.2);color:var(--up)}
.modal-st.err{background:rgba(237,75,158,0.08);border:1px solid rgba(237,75,158,0.2);color:var(--dn)}
.modal-st.info{background:var(--gold-dim);border:1px solid rgba(255,215,0,0.2);color:var(--gold)}
.result-bg{position:fixed;inset:0;background:rgba(0,0,0,0.88);backdrop-filter:blur(16px);z-index:400;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn 0.3s ease}
.result-box{background:var(--surface);border-radius:24px;padding:36px 28px;width:100%;max-width:340px;text-align:center;position:relative}
.result-box.win{border:2px solid var(--up);box-shadow:0 0 60px rgba(31,199,212,0.25)}
.result-box.lose{border:2px solid var(--dn);box-shadow:0 0 40px rgba(237,75,158,0.1)}
.result-box.cancel{border:2px solid var(--muted)}
.result-emoji{font-size:58px;margin-bottom:10px;display:block}
.result-title{font-size:30px;font-weight:800;letter-spacing:1px;margin-bottom:8px}
.result-title.win{color:var(--up)}
.result-title.lose{color:var(--dn)}
.result-title.cancel{color:var(--muted)}
.result-sub{font-size:13px;color:var(--muted);margin-bottom:22px;line-height:1.8}
.result-amount{font-size:34px;font-weight:800;font-family:'DM Mono',monospace;color:var(--up);margin-bottom:4px}
.result-lbl{font-size:11px;color:var(--muted);letter-spacing:1px;font-family:'DM Mono',monospace;margin-bottom:22px}
.result-btn{width:100%;padding:13px;border-radius:12px;border:none;background:var(--surface2);color:var(--text);font-family:'Kanit',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.2s;letter-spacing:0.5px}
.result-btn:hover{background:var(--border)}
.confetti-wrap{position:fixed;inset:0;pointer-events:none;z-index:399;overflow:hidden}
.cp{position:absolute;top:-20px;animation:cfFall linear forwards}
@keyframes cfFall{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
.toast-wrap{position:fixed;bottom:20px;right:20px;z-index:500;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast-item{background:var(--surface2);border-radius:10px;padding:10px 18px;font-size:12px;font-family:'DM Mono',monospace;border:1px solid var(--border);animation:slideUp 0.3s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.toast-item.ok{border-color:rgba(31,199,212,0.4);color:var(--up)}
.toast-item.err{border-color:rgba(237,75,158,0.4);color:var(--dn)}
.toast-item.info{border-color:rgba(255,215,0,0.4);color:var(--gold)}
.calculando-wrap{display:flex;flex-direction:column;align-items:center;padding:4px 0;gap:4px}
.calculando-txt{font-size:14px;font-weight:800;letter-spacing:3px;color:var(--up);animation:calcPulse 1.2s ease-in-out infinite}
@keyframes calcPulse{0%,100%{opacity:1;color:#1FC7D4}50%{opacity:0.3;color:#7B5EFF}}
.spinner{display:inline-block;width:11px;height:11px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:5px}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:600px){.price-bar{display:none}.admin-grid{grid-template-columns:1fr}.carousel-padding{width:20px}}

</style>

        value:condiciones, onChange:e=>setCondiciones(e.target.value),
        rows:2,
        style:{width:'100%',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:8,padding:'8px 10px',color:'var(--text)',fontFamily:'DM Mono,monospace',fontSize:12,marginBottom:8,outline:'none',resize:'none'}
      }),
      React.createElement('input', {
        type:'datetime-local', value:fecha, onChange:e=>setFecha(e.target.value),
        style:{width:'100%',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:8,padding:'8px 10px',color:'var(--text)',fontFamily:'DM Mono,monospace',fontSize:12,marginBottom:10,outline:'none'}
      }),
      React.createElement('button', {
        onClick:handleCrear, disabled:creating,
        style:{width:'100%',padding:'10px',borderRadius:10,border:'none',background:'linear-gradient(135deg,var(--gold),var(--gold2))',color:'#000',fontFamily:'Kanit,sans-serif',fontSize:13,fontWeight:800,cursor:'pointer'}
      }, creating ? 'Creando...' : '▶ Crear Predicción')
    ),

    // Carrusel de preguntas
    preguntas.length > 0 ? React.createElement('div', {
      ref: carruselRef,
      style:{display:'flex',gap:12,padding:'8px 0 16px',overflowX:'auto',scrollSnapType:'x mandatory',scrollbarWidth:'none',alignItems:'stretch',cursor:'grab'}
    },
      React.createElement('div', {style:{flexShrink:0,width:'calc(50vw - 160px)'}}),
      ...preguntas.map(p => React.createElement(CardPregunta, {
        key:p.id, pregunta:p, web3, contrato, contratoE,
        wallet, soloLectura, esOwner,
        onBet:(id,resp) => setModalBet({id,resp}),
        onResolver:handleResolver,
        onCancelar:handleCancelar
      })),
      React.createElement('div', {style:{flexShrink:0,width:'calc(50vw - 160px)'}})
    ) : esOwner && React.createElement('div', {style:{textAlign:'center',padding:'20px',color:'var(--muted)',fontSize:12,fontFamily:'DM Mono,monospace'}},'No hay predicciones activas'),

    // Modal apuesta pregunta
    modalBet && React.createElement(ModalBetPregunta, {
      id:modalBet.id, respuesta:modalBet.resp, web3,
      onClose:()=>setModalBet(null),
      onConfirm:(amount)=>handleBet(modalBet.id, modalBet.resp, amount)
    })
  );
}

// ============================================================
//  MODAL APUESTA PREGUNTA
// ============================================================
function ModalBetPregunta({id, respuesta, web3, onClose, onConfirm}) {
  const [cnkt, setCnkt] = React.useState('');
  const [loading, setLoading] = React.useState(false);
  const esSi = respuesta === 0;

  const confirm = async () => {
    const c = parseFloat(cnkt);
    if (!c || c < 500 || c > 250000) return;
    setLoading(true);
    await onConfirm(c);
    setLoading(false);
  };

  return React.createElement('div', {
    className:'modal-bg',
    onClick:e=>e.target===e.currentTarget&&onClose()
  },
    React.createElement('div', {className:`modal-box ${esSi?'up':'dn'}`},
      React.createElement('button', {className:'modal-close', onClick:onClose}, '✕'),
      React.createElement('div', {className:`modal-dir ${esSi?'up':'dn'}`}, esSi?'✅ SI':'❌ NO'),
      React.createElement('div', {className:'modal-sub'}, `Predicción #${id}`),
      React.createElement('div', {className:'field'},
        React.createElement('label', null, 'CNKT+ a ingresar'),
        React.createElement('input', {
          type:'number', value:cnkt, onChange:e=>setCnkt(e.target.value),
          placeholder:'500', min:'500'
        }),
        React.createElement('div', {className:'field-hint'}, 'Min 500 · Max 250,000')
      ),
      React.createElement('button', {
        className:`btn-confirm ${esSi?'up':'dn'}`,
        onClick:confirm, disabled:loading||!cnkt||parseFloat(cnkt)<500
      }, loading?'Procesando...':`CONFIRMAR ${esSi?'✅ SI':'❌ NO'}`)
    )
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
